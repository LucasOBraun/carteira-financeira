services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wallet_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: wallet
      DB_USERNAME: wallet
      DB_PASSWORD: wallet_secret
      SESSION_DRIVER: database
      SANCTUM_STATEFUL_DOMAINS: localhost:5173,127.0.0.1:5173
      FRONTEND_URL: http://localhost:5173
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wallet

  nginx:
    image: nginx:alpine
    container_name: wallet_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - wallet

  mysql:
    image: mysql:8.0
    container_name: wallet_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: wallet
      MYSQL_USER: wallet
      MYSQL_PASSWORD: wallet_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wallet

  phpmyadmin:
    image: phpmyadmin:5
    container_name: wallet_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: wallet
      PMA_PASSWORD: wallet_secret
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wallet

  frontend:
    image: node:20-alpine
    container_name: wallet_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_PROXY_TARGET: http://nginx:80
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - wallet

networks:
  wallet:
    driver: bridge

volumes:
  mysql_data:
  frontend_node_modules:
